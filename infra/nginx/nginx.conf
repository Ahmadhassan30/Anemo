worker_processes 1;

events {
  worker_connections 1024;
}

http {
  upstream web {
    server web:3000;
  }

  upstream api {
    server api:8000;
  }

  server {
    listen 80;

    location /api/pipeline/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600;
      proxy_send_timeout 3600;
    }

    location /api/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }
  }
}
