version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lectureos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lectureos}
      POSTGRES_DB: ${POSTGRES_DB:-lectureos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../apps/api/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../apps/api/.env.example
    depends_on:
      - api
      - redis
      - postgres
    volumes:
      - ../apps/api:/app
    command: celery -A tasks.celery_app:celery_app worker --loglevel=INFO

volumes:
  postgres_data:
  redis_data:
